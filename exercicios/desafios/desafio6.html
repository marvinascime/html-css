    <h1>Desafio 6 - Tags em HTML</h1>
    <p>Em HTML5, podemos inserir os elementos da lista a seguir. <br> Passe o mouse sobre os termos para descobrir qual tag deverá utilizar em cada caso.</p>

    <ul>
        <li type="square"><a title="Use a tag <p>">Parágrafos</a></li>

        <li type="circle"> <a title="Os titulos seguem uma ordem de hierarquia: H1, H2, H3, H4, H5, H6">Títulos</a></li>

        <li> <a title="Para inserir imagens utilize a tag <img>">Imagens</a></li>

        <li type="square"> <a title="Para inserir abreviações utilize a tag <abbr>">Abreviações</a></li>

        <li type="circle"> <a title="Para inserir uma formatação onde você precisa que fique igual a código fonte, é utilizada a tag <code> ">Código-fonte</a></li>

        <li><a title="Para listas numeradas ou listas ordenadas, utiliza-se a tag <ol>, nela tem a possibilidade de escolher entre 1, A, a, I, i.">Lista numerada/ordenada</a></li>

        <li> <a title="Para listas com marcadores ou listas não-ordenadas, utilizamos a tag <ul>, nela tem a possibilidade de escolher os marcadores em circulo preenchido, circulo vazado ou quadrado">Listas com marcadores</a></li>
    </ul>
