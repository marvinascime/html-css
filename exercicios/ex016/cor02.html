<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradiete em CSS</title>
    <style>
        *{ /*Configurações globais das CSS é com asteristico */
            height: 100% /*height é altura*/
        }

        body{
            background-image: linear-gradient(to bottom right, #3198e2, #6D59C0, #B93590, #E33F5F, #FDD579);
            background-attachment: fixed; /*Fixa o plano de fundo*/
        }
    </style>
</head>
<body>
    <h1>Testando Gradiente</h1>

</body>
</html>
