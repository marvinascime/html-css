<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alinhamento Vertical</title>
    <style>
        #conteiner{
            background-image: url('imagens/target001.png');
            background-size: 100% 100%;
            position: relative; /*Quando for fazer um posicionamento vertical, o conteiner fica com o posicionamento relativo*/
            height: 94vh;
            padding: 10px;
            background-color: purple;

        }

        #conteudo{
            background-image: url('imagens/target001.png');
            background-size: 100% 100%;
            position: absolute; /*E o conteudo fica com o posicionamento absoluto, para que ele permita a utilização de mudança de área*/
            height: 200px;
            width: 400px;
            background-color: yellow;
            
            left: 50%;
            top: 50%;

            transform: translate(-50%, -50%); /*Reposicionar elementos na página utilizando o eixo x e eixo y*/
            

        }
    </style>
</head>
<body>
    <section id="conteiner">
        <article id="conteudo">

        </article>
    </section>
</body>
</html>
