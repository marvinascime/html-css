<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imagens Dinâmicas</title>
</head>
<body>
    <h1>Imagens dinâmicas</h1>
    <p>Tente abrir esse site em varios dispositivos diferentes ou simplesmente aumete e diminua o tamanho do seu navegador.</p>
    <picture>
        <source media="(max-width: 750px)" srcset="imagens/foto-p.png" type="image/png">
        <source media="(max-width: 1050px)" srcset="imagens/foto-m.png" type="image/png">
        <img src="imagens/foto-g.png" alt="imagem flexiviel">
    </picture>

    <h1>Reproduzindo Áudio</h1>
    <p>Vamos aprender a reproduzir áudios em HTML5</p>
    <audio src="midia/Grey-Room.mp3" controls autoplay></audio>

    <audio preload="metadata" autoplay controls>
        <source src="midia/Really-Happening.mp3" type="audio/mpeg">
        <source src="midia/Really-Happening.wav" type="audio/wav">
        <source src="midia/Really-Happening.ogg" type="audio/ogg">
        <p>infelizmente o seu navegador nao consegue reproduzir áudio <a href="midia/Really-Happening.mp3"></a>Clique aqui para fazer o download</p>
    </audio>
</body>
</html>
